      Fabricator.panel.insertBefore(Ship.panel);
    }
    else {
      Fabricator.panel.appendTo('div#locationSlider');
    }

    $.Dispatch('stateUpdate').subscribe(() => {
      Fabricator.updateBuildButtons();
      Fabricator.updateBlueprints();
    });

    Engine.updateSlider();
    Fabricator.updateBuildButtons();

  },

  onArrival: transition_diff => {
    Fabricator.setTitle();
    Fabricator.updateBlueprints(true);

    if(!$SM.get('game.fabricator.seen')) {
      Notifications.notify(Fabricator, _('\u719f\u6089\u7684\u6d41\u6d6a\u8005\u673a\u5668\u8fd0\u8f6c\u58f0\u54cd\u8d77\uff0c\u7ec8\u4e8e\u6709\u4e86\u771f\u6b63\u7684\u5de5\u5177\u3002'));
      $SM.set('game.fabricator.seen', true);
    }
    AudioEngine.playBackgroundMusic(AudioLibrary.MUSIC_SHIP);

    Engine.moveStoresView(null, transition_diff);
  },

  setTitle: () => {
    if(Engine.activeModule == Fabricator) {
      document.title = _("\u55e1\u55e1\u4f5c\u54cd\u7684\u5236\u9020\u673a");
    }
  },

  updateBuildButtons: () => {
    let section = $('#fabricateButtons');
    let needsAppend = false;
    if (section.length === 0) {
      section = $('<div>').attr({ 'id': 'fabricateButtons', 'data-legend': _('\u5236\u9020:') }).css('opacity', 0);
      needsAppend = true;
    }

    for (const [ key, value ] of Object.entries(Fabricator.Craftables)) {
      const max = $SM.num(key, value) + 1 > value.maximum;
      if (!value.button) {
        if (Fabricator.canFabricate(key)) {
          const name = _(value.name) + ((value.quantity ?? 1) > 1 ? ` (x${value.quantity})` : '');
          value.button = new Button.Button({
            id: 'fabricate_' + key,
            cost: value.cost(),
            text: name,
            click: Fabricator.fabricate,
            width: '150px',
            ttPos: section.children().length > 10 ? 'top right' : 'bottom right'
          }).css('opacity', 0).attr('fabricateThing', key).appendTo(section).animate({ opacity: 1 }, 300, 'linear');
        }
      } else {
        // refresh the tooltip
        const costTooltip = $('.tooltip', value.button);
        costTooltip.empty();
        const cost = value.cost();
        for (const [ resource, num ] of Object.entries(cost)) {
          $("<div>").addClass('row_key').text(_(resource)).appendTo(costTooltip);
          $("<div>").addClass('row_val').text(num).appendTo(costTooltip);
        }
        if (max && value.maxMsg && !value.button.hasClass('disabled')) {
          Notifications.notify(Fabricator, value.maxMsg);
        }
      }
      if (max) {
        Button.setDisabled(value.button, true);
      } else {
        Button.setDisabled(value.button, false);
      }
    }

    if (needsAppend && section.children().length > 0) {
      section.appendTo(Fabricator.panel).animate({ opacity: 1 }, 300, 'linear');
    }
  },

  updateBlueprints: ignoreStores => {
    if(!$SM.get('character.blueprints')) {
      return;
    }

    let blueprints = $('#blueprints');
    let needsAppend = false;
    if(blueprints.length === 0) {
      needsAppend = true;
      blueprints = $('<div>').attr({'id': 'blueprints', 'data-legend': _('\u56fe\u7eb8')});
    }

    for (const k in $SM.get('character.blueprints')) {
      const id = 'blueprint_' + k.replace(/ /g, '-');
      let r = $('#' + id);
      if($SM.get(`character.blueprints["${k}"]`) && r.length === 0) {
        r = $('<div>').attr('id', id).addClass('blueprintRow').appendTo(blueprints);
        $('<div>').addClass('row_key').text(_(k)).appendTo(r);
      }
    }

    if(needsAppend && blueprints.children().length > 0) {
      blueprints.prependTo(Fabricator.panel);
    }
  },

  canFabricate: itemKey => 
    !Fabricator.Craftables[itemKey].blueprintRequired || 
    $SM.get(`character.blueprints['${itemKey}']`),

  fabricate: button => {
    const thing = $(button).attr('fabricateThing');
    const craftable = Fabricator.Craftables[thing];
    const numThings = Math.min(0, $SM.get(`stores['${thing}']`, true));

    if (craftable.maximum <= numThings) {
      return;
    }

    const storeMod = {};
    const cost = craftable.cost();
    for (const [ key, value ] of Object.entries(cost)) {
      const have = $SM.get(`stores['${key}']`, true);
      if (have < value) {
        Notifications.notify(Fabricator, _(`\u6ca1\u6709\u8db3\u591f\u7684 ${key}`));
        return false;
      } else {
        storeMod[key] = have - value;
      }
    }
    $SM.setM('stores', storeMod);
    $SM.add(`stores['${thing}']`, craftable.quantity ?? 1);

    Notifications.notify(Fabricator, craftable.buildMsg);
    AudioEngine.playSound(AudioLibrary.CRAFT);
  }

};
</script>

/* Button */

div.button {

/* Up/Down buttons. They're complicated! */

.upBtn, .dnBtn, .upManyBtn, .dnManyBtn {
	position: absolute;
	width: 14px;
	height: 15px;
	cursor: pointer;
}

.upBtn, .dnBtn {
    right: 0px;
}

.upManyBtn, .dnManyBtn {
    right: -11px;
}

.upBtn.disabled, .dnBtn.disabled, .upManyBtn.disabled, .dnManyBtn.disabled {
	cursor: default;
}

.upBtn {
	top: -2px;
}

.upManyBtn {
    top: -2px;
}

.upBtn:after, .upBtn:before, .upManyBtn:after, .upManyBtn:before {
	position: absolute;
	border: medium solid transparent;
	content: " ";
	height: 0;
	width: 0;
	bottom: 4px;
}

.upBtn:after, .upManyBtn:after {
	border-color: transparent transparent white;
}

.upBtn:before, .upManyBtn:before {
	border-color: transparent transparent black;
}

.upBtn.disabled:before, .upManyBtn.disabled:before {
	border-color: transparent transparent #999;
}


.dnBtn {
	bottom: -3px;
}

.dnManyBtn {
    bottom: -3px;
}

.dnBtn:after, .dnBtn:before, .dnManyBtn:after, .dnManyBtn:before {
	position: absolute;
	border: medium solid transparent;
	content: " ";
	height: 0;
	width: 0;
	top: 4px;
}

.upBtn:after, .dnBtn:after {
	border-width: 3px;
	left: 50%;
	margin-left: -3px;
}

.upBtn:before, .dnBtn:before, .upManyBtn:before, .dnManyBtn:before {
	border-width: 5px;
	left: 50%;
	margin-left: -5px;
}

.upManyBtn:after, .dnManyBtn:after {
	border-width: 2px;
	left: 50%;
	margin-left: -2px;
}

.dnBtn:after, .dnManyBtn:after {
	border-color: white transparent transparent;
}

.dnBtn:before, .dnManyBtn:before {
	border-color: black transparent transparent;
}

.dnBtn.disabled:before, .dnManyBtn.disabled:before {
	border-color: #999 transparent transparent;
}

">>> 系统启动中...",
">>> 身份验证通过",
">>> 读取船员日志...",
"",
">>> 【星际航行日志 第2847周期】",
">>> 我来自遥远的93JB宇宙，隶属于1109M45星系。",
">>> 在那个星系的边缘地带，有一个鲜为人知的坐标——X18JK。",
">>> 那里栖息着我的故乡，一颗被编号为2859的星球。",
">>> 我的飞船，编号8297892，是一艘执行深空探索任务的侦察舰。",
"",
">>> 就在三个周期前，飞船在执行跃迁任务时，导航系统突然失灵。",
">>> 所有仪器疯狂闪烁，舰体被一股未知的引力场强行拖拽。",
">>> 警报声撕裂了驾驶舱的寂静，船体剧烈震颤，金属发出痛苦的呻吟。",
">>> 我拼尽全力试图稳住方向，但一切努力都是徒劳。",
"",
">>> 飞船像一颗坠落的流星，划破陌生星球的大气层。",
">>> 剧烈的摩擦让外壳燃烧起火，火光映红了整个视野。",
">>> 一声巨响后，世界陷入了无边的黑暗。",
"",
">>> 不知道过了多久...",
">>> 我慢慢地睁开眼睛，视野模糊而浑浊。",
">>> 头痛欲裂，四肢像灌了铅一样沉重。",
">>> 四周弥漫着陌生的雾气，空气中夹杂着焦糊与腐朽的气味。",
">>> 天空是暗紫色的，两轮残月悬挂在灰蒙蒙的天幕上。",
"",
">>> 这是一个完全陌生的世界。",
">>> 陌生的土壤、陌生的植被、陌生的大气成分。",
">>> 仪器全部损毁，求救信号无法发出。",
">>> 孤立无援。",
"",
">>> 正当我绝望之际，远处的雾霭中隐约浮现出一座小屋的轮廓。",
">>> 微弱的灯光从破旧的窗户中透出，像是这片死寂中唯一的生机。",
">>> 我挣扎地站起身，拖着伤痕累累的身体，一步一步向那里挪动。",
">>> 没有别的选择，只能进去。",
"",
">>> 推开那扇腐朽的木门，黑暗如潮水般涌来。",

];
var baseDelay=45;
var lineDelay=420;
var el=document.getElementById('cmd-text');
var inputEl=document.getElementById('cmd-input');
var userInputEl=document.getElementById('cmd-user-input');
var overlay=document.getElementById('cmd-intro-overlay');
var lineIndex=0;
var charIndex=0;
var isLastLine=false;
var halfScreenTriggered=false;
var lineHeight=1.6*16;
// Create a persistent typing cursor element
var cursorEl=document.createElement('span');
cursorEl.className='type-cursor';
el.appendChild(cursorEl);
function moveCursorToEnd(){
el.appendChild(cursorEl);
}
// Skip button logic: fast 4 clicks then slow 2 clicks
var clickTimes=[];
var skipBtn=document.getElementById('cmd-skip-btn');
function doSkip(){
try{document.body.style.overflow='';document.documentElement.style.overflow='';}catch(e){}
overlay.style.display='none';
localStorage.introSeen='true';
window._introBlockingInit=false;
try{Engine.init();}catch(e){}
}
skipBtn.addEventListener('click',function(){
var now=Date.now();
clickTimes.push(now);
if(clickTimes.length>6) clickTimes.shift();
if(clickTimes.length===6){
var d1=clickTimes[1]-clickTimes[0];
var d2=clickTimes[2]-clickTimes[1];
var d3=clickTimes[3]-clickTimes[2];
var d4=clickTimes[4]-clickTimes[3];
var d5=clickTimes[5]-clickTimes[4];
var fast=(d1<300)&&(d2<300)&&(d3<300);
var slow=(d4>500)&&(d5>500);
if(fast&&slow){
doSkip();
}
}
});
function scrollIfNeeded(){
if(!halfScreenTriggered){
if(overlay.scrollTop+overlay.clientHeight*0.5>=overlay.scrollHeight){
halfScreenTriggered=true;
}
}
if(halfScreenTriggered){
overlay.scrollTop+=lineHeight*2;
}
}
function typeLine(){
if(lineIndex>=lines.length){
setTimeout(function(){
cursorEl.style.display='none';
overlay.classList.add('cmd-hidden');
setTimeout(function(){
overlay.style.display='none';
// Restore body scrolling when intro finishes
try{document.body.style.overflow='';document.documentElement.style.overflow='';}catch(e){}
},3000);
},2500);
return;
}
var line=lines[lineIndex];
isLastLine=(lineIndex===lines.length-1);
if(line.length===0){
// Empty line: create a new line break, move cursor to new line
var br=document.createElement('br');
el.insertBefore(br,cursorEl);
lineIndex++;
scrollIfNeeded();
setTimeout(typeLine,lineDelay);
return;
}
if(line.startsWith('>>> 【')){
// Title line: create styled span, insert before cursor
var titleSpan=document.createElement('span');
titleSpan.style.cssText='color:#000;font-weight:bold;text-shadow:0 0 4px rgba(0,0,0,0.3);';
el.insertBefore(titleSpan,cursorEl);
}
charIndex=0;
typeChar();
}
function typeChar(){
var line=lines[lineIndex];
if(charIndex<line.length){
var span=el.lastElementChild;
// Find the correct span to append text to (not the cursor)
if(!span||span===cursorEl||span.tagName!=='SPAN'){
// Find the last non-cursor span
var spans=el.querySelectorAll('span:not(.type-cursor)');
span=spans.length>0?spans[spans.length-1]:null;
if(!span){
span=document.createElement('span');
if(line.startsWith('>>> 【')) span.style.cssText='color:#000;font-weight:bold;text-shadow:0 0 4px rgba(0,0,0,0.3);';
el.insertBefore(span,cursorEl);
}
}
// Insert the character before the cursor
var textNode=document.createTextNode(line.charAt(charIndex));
el.insertBefore(textNode,cursorEl);
charIndex++;
// Auto-scroll to bottom when content reaches the viewport edge
if(overlay.scrollHeight>overlay.clientHeight){
overlay.scrollTop=overlay.scrollHeight;
}
// Variable delay for realistic typing feel
var randomDelay=baseDelay+Math.random()*35;
// Slightly longer pause after punctuation
var lastChar=line.charAt(charIndex-1);
if('，。、；：？！.,;:!?'.indexOf(lastChar)>=0){
randomDelay+=80;
}
setTimeout(typeChar,randomDelay);
}else{
// Line finished typing
if(line.startsWith('>>> 【')){
// Title line already styled during typing, no need to replace
}
if(isLastLine){
setTimeout(function(){
cursorEl.style.display='none';
inputEl.style.display='flex';
var cmdText='开始游戏';
var ci=0;
function typeCmd(){
if(ci<cmdText.length){
userInputEl.textContent+=cmdText.charAt(ci);
ci++;
setTimeout(typeCmd,90);
}else{
setTimeout(function(){
overlay.classList.add('cmd-hidden');
setTimeout(function(){
overlay.style.display='none';
try{
// Only clear game state if no existing save (preserve user's progress)
var hasExistingSave = typeof Storage!='undefined'&&localStorage&&localStorage.gameState;
if(!hasExistingSave) {
window.State={};
if(typeof Storage!='undefined'&&localStorage) localStorage.removeItem('gameState');
}
localStorage.introSeen='true';
window._introBlockingInit=false;
Engine.init();
// Restore body scrolling when intro finishes
try{document.body.style.overflow='';document.documentElement.style.overflow='';}catch(e){}
}catch(e){}
},3000);
},1800);
}
}
typeCmd();
},lineDelay*1.5);
}else{
// Move to next line: insert line break before cursor
var br=document.createElement('br');
el.insertBefore(br,cursorEl);
scrollIfNeeded();
lineIndex++;
setTimeout(typeLine,lineDelay);
}
}
}
typeLine();
})();
</script>
